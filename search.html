<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — gusty.ca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
  <style>
    /* ============================================================
       GUSTY.CA DESIGN TOKENS
       ============================================================ */
    :root {
      --color-bg:          #0B1120;
      --color-surface:     #111827;
      --color-surface-elevated: #1A2333;
      --color-border:      rgba(255, 255, 255, 0.07);
      --color-border-strong: rgba(255, 255, 255, 0.13);

      --color-text-primary:   #F0F4F8;
      --color-text-secondary: #8A9BB0;
      --color-text-muted:     #4A5C72;
      --color-text-inverse:   #0B1120;

      --color-accent:         #38BDF8;
      --color-accent-dim:     rgba(56, 189, 248, 0.15);
      --color-accent-border:  rgba(56, 189, 248, 0.30);

      --font-ui:   'Inter', system-ui, sans-serif;
      --font-data: 'DM Mono', 'Menlo', monospace;

      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-lg:   18px;
      --text-xl:   22px;

      --weight-regular:  400;
      --weight-medium:   500;
      --weight-semibold: 600;

      --tracking-tight:  -0.025em;
      --tracking-wide:    0.06em;

      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-16: 64px;

      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --radius-full: 999px;
    }

    /* ============================================================
       RESET + BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100vh;
      max-width: 390px;
      margin: 0 auto;
      padding: 0;
      padding-bottom: var(--space-16);
      display: flex;
      flex-direction: column;
    }

    /* ============================================================
       TOP BAR
       ============================================================ */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      flex-shrink: 0;
    }
    .wordmark {
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text-primary);
    }
    .top-bar-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .icon-btn {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      padding: var(--space-2);
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }

    /* ============================================================
       SEARCH BAR
       ============================================================ */
    .search-bar-wrap {
      padding: 0 var(--space-4) var(--space-4);
      flex-shrink: 0;
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      min-height: 44px;
    }
    .search-bar svg {
      width: 20px;
      height: 20px;
      stroke: var(--color-text-muted);
      flex-shrink: 0;
    }
    .search-bar-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      outline: none;
    }
    .search-bar-input::placeholder {
      color: var(--color-text-muted);
    }
    .search-bar.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    /* ============================================================
       SUGGESTIONS LIST
       ============================================================ */
    .search-bar-wrap {
      position: relative;
    }
    .suggestions-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: var(--space-2);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      z-index: 30;
      max-height: 280px;
      overflow-y: auto;
    }
    .suggestions-list.hidden,
    .suggestions-list:empty {
      display: none !important;
    }
    .suggestion-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      min-height: 44px;
      border-bottom: 1px solid var(--color-border);
    }
    .suggestion-item:last-child {
      border-bottom: none;
    }
    .suggestion-item:hover {
      background: var(--color-surface-elevated);
    }
    .suggestion-item .suggestion-icon {
      color: var(--color-text-muted);
      flex-shrink: 0;
    }
    .suggestion-item .suggestion-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
    }
    .suggestion-item .suggestion-name {
      flex: 1;
    }
    .suggestion-item .suggestion-elev,
    .suggestion-item .suggestion-region {
      font-family: var(--font-data);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    /* ============================================================
       MAP
       ============================================================ */
    .map-placeholder {
      flex: 1;
      min-height: 200px;
      background: var(--color-surface);
      position: relative;
      overflow: hidden;
    }
    #map {
      width: 100%;
      height: 100%;
      min-height: 200px;
      position: absolute;
      inset: 0;
      filter: saturate(0.85) brightness(0.9);
    }
    .map-dim-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      pointer-events: none;
      z-index: 5;
    }
    .map-dim-overlay.visible {
      pointer-events: auto;
    }
    /* Pulsing dot marker */
    .map-pulsing-dot {
      position: relative;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #38BDF8;
      box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6);
      animation: map-pulse 1.5s ease-out infinite;
      pointer-events: none;
    }
    @keyframes map-pulse {
      0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6); }
      70% { box-shadow: 0 0 0 12px rgba(56, 189, 248, 0); }
      100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
    }
    .map-zoom-controls {
      position: absolute;
      bottom: var(--space-4);
      right: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .map-zoom-btn {
      width: 36px;
      height: 36px;
      background: #1A2333;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: var(--radius-md);
      color: #F0F4F8;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      line-height: 1;
    }
    .map-zoom-btn:hover {
      background: var(--color-surface);
      color: var(--color-text-primary);
    }
    /* Mapbox attribution: bottom-left, margin to avoid overlap with zoom controls */
    .mapboxgl-ctrl-bottom-right {
      left: 0;
      right: auto;
      margin-left: 8px;
      margin-bottom: 8px;
    }
    .mapboxgl-ctrl-attrib {
      font-size: 10px;
      opacity: 0.5;
    }
    .mapboxgl-ctrl-attrib:hover {
      opacity: 1;
    }

    /* ============================================================
       BOTTOM SHEET (Result Selected)
       ============================================================ */
    .bottom-sheet {
      position: fixed;
      bottom: var(--space-16);
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-bottom: none;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      overflow: hidden;
      transition: transform 350ms cubic-bezier(0.4, 0, 0.2, 1), max-height 0.3s ease;
      z-index: 10;
    }
    .bottom-sheet.hidden {
      transform: translateX(-50%) translateY(100%);
      pointer-events: none;
    }
    .bottom-sheet.expanded {
      max-height: 360px;
    }
    .bottom-sheet.peek {
      max-height: 72px;
    }
    .sheet-handle-wrap {
      display: flex;
      justify-content: center;
      padding-top: var(--space-2);
      padding-bottom: var(--space-1);
      cursor: pointer;
    }
    .sheet-handle {
      width: 32px;
      height: 4px;
      border-radius: var(--radius-full);
      background: var(--color-text-muted);
    }
    .sheet-peek-area {
      padding: 0 var(--space-6) var(--space-3);
    }
    .bottom-sheet.peek .sheet-peek-area {
      cursor: pointer;
    }
    .sheet-body {
      padding: var(--space-4) var(--space-6) var(--space-8);
      transition: opacity 0.3s ease;
    }
    .bottom-sheet.peek .sheet-body {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }
    .sheet-location-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }
    .bottom-sheet.peek .sheet-location-row {
      margin-bottom: 0;
    }
    .sheet-location-name {
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text-primary);
    }
    .sheet-elevation-chip {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      font-family: var(--font-data);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
    }
    .sheet-coords {
      font-size: var(--text-sm);
      font-family: var(--font-data);
      color: var(--color-text-muted);
      margin-bottom: var(--space-5);
    }
    .sheet-elevation-selector {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
    }
    .elevation-chip {
      padding: 6px var(--space-3);
      border-radius: var(--radius-full);
      font-family: var(--font-data);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      cursor: pointer;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--color-border);
      background: var(--color-surface-elevated);
      color: var(--color-text-secondary);
    }
    .elevation-chip.active {
      background: var(--color-accent-dim);
      border-color: var(--color-accent-border);
      color: var(--color-accent);
    }
    .sheet-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      padding: var(--space-4);
      background: var(--color-accent);
      color: var(--color-text-inverse);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      text-decoration: none;
      min-height: 44px;
    }

    /* ============================================================
       BOTTOM NAVIGATION
       ============================================================ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      height: var(--space-16);
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 var(--space-4);
      backdrop-filter: blur(12px);
      z-index: 20;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2);
      min-width: 44px;
      min-height: 44px;
      justify-content: center;
      text-decoration: none;
      color: var(--color-text-secondary);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
    }
    .nav-item.active {
      color: var(--color-accent);
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }
    .nav-item.active .nav-icon {
      background: var(--color-accent-dim);
      border-radius: 50%;
      padding: 4px;
    }
  </style>
</head>

      var markerEl = document.createElement('div');
      markerEl.className = 'map-pulsing-dot';
      var marker = new mapboxgl.Marker({ element: markerEl, anchor: 'center' })
        .setLngLat(defaultCenter)
        .addTo(map);

      // Zoom controls
      document.getElementById('map-zoom-in').addEventListener('click', function() {
        map.zoomIn();
      });
      document.getElementById('map-zoom-out').addEventListener('click', function() {
        map.zoomOut();
      });

      function flyToLocation(lng, lat) {
        map.flyTo({
          center: [lng, lat],
          zoom: 13,
          duration: 1200
        });
        marker.setLngLat([lng, lat]);
      }

      function formatCoords(lng, lat) {
        var ns = lat >= 0 ? 'N' : 'S';
        var ew = lng >= 0 ? 'E' : 'W';
        return Math.abs(lat).toFixed(4) + '° ' + ns + ' · ' + Math.abs(lng).toFixed(4) + '° ' + ew;
      }

      function getRegionFromContext(context) {
        if (!context || !Array.isArray(context)) return '';
        var region = context.find(function(c) { return c.id && c.id.indexOf('region') === 0; });
        return region ? region.text : '';
      }

      function fetchGeocode(query) {
        var requestId = ++lastRequestId;
        searchBar.classList.add('loading');
        var url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxgl.accessToken}&country=CA&proximity=-123.0%2C49.9&limit=5`;
        console.log(url);
        fetch(url)
          .then(function(res) { return res.json(); })
          .then(function(data) {
            console.log(data.features);
            if (requestId !== lastRequestId) return;
            searchBar.classList.remove('loading');
            renderSuggestions(data.features || []);
          })
          .catch(function() {
            if (requestId !== lastRequestId) return;
            searchBar.classList.remove('loading');
            renderSuggestions([]);
          });
      }

      function renderSuggestions(features) {
        suggestionsList.innerHTML = '';
        if (features.length === 0) {
          suggestionsList.classList.add('hidden');
          return;
        }
        suggestionsList.classList.remove('hidden');
        features.forEach(function(f) {
          var coords = f.geometry && f.geometry.coordinates;
          if (!coords || coords.length < 2) return;
          var lng = coords[0];
          var lat = coords[1];
          var name = f.text || f.place_name || '';
          var region = getRegionFromContext(f.context);
          var coordsStr = formatCoords(lng, lat);
          var btn = document.createElement('button');
          btn.className = 'suggestion-item';
          btn.type = 'button';
          btn.dataset.name = name;
          btn.dataset.elev = '—';
          btn.dataset.coords = coordsStr;
          btn.dataset.lat = lat;
          btn.dataset.lng = lng;
          btn.innerHTML = '<span class="suggestion-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" /></svg></span><span class="suggestion-name"></span><span class="suggestion-region"></span>';
          btn.querySelector('.suggestion-name').textContent = name || '';
          btn.querySelector('.suggestion-region').textContent = region || '';
          btn.addEventListener('click', function() {
            goToSelected(btn.dataset.name, btn.dataset.elev, btn.dataset.coords, btn.dataset.lat, btn.dataset.lng);
            suggestionsList.innerHTML = '';
            suggestionsList.classList.add('hidden');
          });
          suggestionsList.appendChild(btn);
        });
      }

      function setState(newState) {
        state = newState;
        if (state === STATES.DEFAULT) {
          suggestionsList.classList.add('hidden');
          sheet.classList.add('hidden');
          mapDimOverlay.classList.remove('visible');
          searchInput.value = '';
          searchInput.placeholder = 'Search a peak, trailhead, or spot…';
        } else if (state === STATES.SEARCHING) {
          sheet.classList.add('hidden');
          mapDimOverlay.classList.add('visible');
          if (selectedLocation) {
            searchInput.value = selectedLocation.name;
            searchInput.placeholder = '';
          } else {
            searchInput.value = searchInput.value || '';
            searchInput.placeholder = 'Search a peak, trailhead, or spot…';
          }
        } else if (state === STATES.SELECTED) {
          suggestionsList.innerHTML = '';
          suggestionsList.classList.add('hidden');
          sheet.classList.remove('hidden');
          sheet.classList.remove('peek');
          sheet.classList.add('expanded');
          mapDimOverlay.classList.remove('visible');
          searchInput.value = selectedLocation.name;
          searchInput.placeholder = '';
          document.querySelector('.sheet-location-name').textContent = selectedLocation.name;
          document.querySelector('.sheet-elevation-chip').textContent = selectedLocation.elev;
          document.querySelector('.sheet-coords').textContent = selectedLocation.coords;
        }
      }

      function toggleSheetExpand() {
        if (state !== STATES.SELECTED || sheet.classList.contains('hidden')) return;
        if (sheet.classList.contains('peek')) {
          sheet.classList.remove('peek');
          sheet.classList.add('expanded');
        } else {
          sheet.classList.remove('expanded');
          sheet.classList.add('peek');
        }
      }

      function goToSearching() {
        setState(STATES.SEARCHING);
      }

      function goToSelected(name, elev, coords, lat, lng) {
        selectedLocation = { name: name, elev: elev, coords: coords };
        setState(STATES.SELECTED);
        if (lat != null && lng != null) {
          flyToLocation(parseFloat(lng), parseFloat(lat));
        }
      }

      function dismissSuggestions() {
        if (selectedLocation) {
          setState(STATES.SELECTED);
        } else {
          setState(STATES.DEFAULT);
        }
      }

      searchBar.addEventListener('click', function() {
        if (state === STATES.DEFAULT || state === STATES.SELECTED) {
          goToSearching();
        }
      });

      searchInput.addEventListener('input', function() {
        var query = searchInput.value.trim();
        if (state !== STATES.SEARCHING) goToSearching();
        clearTimeout(debounceTimer);
        if (query.length >= 3) {
          debounceTimer = setTimeout(function() {
            fetchGeocode(query);
          }, 300);
        } else {
          renderSuggestions([]);
        }
      });

      searchInput.addEventListener('focus', function() {
        if (state === STATES.DEFAULT || state === STATES.SELECTED) {
          goToSearching();
        }
      });

      mapDimOverlay.addEventListener('click', function() {
        if (state === STATES.SEARCHING) {
          dismissSuggestions();
        }
      });

      document.addEventListener('click', function(e) {
        if (state === STATES.SEARCHING &&
            !searchBar.contains(e.target) && !suggestionsList.contains(e.target)) {
          dismissSuggestions();
        }
      });

      var sheetHandle = document.getElementById('sheet-handle');
      var sheetPeekArea = document.getElementById('sheet-peek-area');
      if (sheetHandle) sheetHandle.addEventListener('click', toggleSheetExpand);
      if (sheetPeekArea) sheetPeekArea.addEventListener('click', function() {
        if (state === STATES.SELECTED && sheet.classList.contains('peek')) {
          sheet.classList.remove('peek');
          sheet.classList.add('expanded');
        }
      });
    });
  </script>
</body>
</html>
