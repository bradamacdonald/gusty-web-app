<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>Search — gusty.ca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@1,700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
  <script type="module" src="/src/app/routes/search.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<div class="app-frame">

  <!-- TOP BAR -->
  <header class="top-bar">
    <span class="wordmark">GUSTY</span>
  </header>

  <!-- SEARCH BAR -->
  <div class="search-bar-wrap">
    <div class="search-bar" id="search-bar">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
      <input type="text" class="search-bar-input" id="search-input" placeholder="Search a peak, trailhead, or spot…" autocomplete="off">
    </div>
    <div class="suggestions-list hidden" id="suggestions-list"></div>
  </div>

  <!-- MAP -->
  <div class="map-placeholder">
    <div id="map"></div>
    <div class="map-dim-overlay" id="map-dim-overlay"></div>
    <div class="map-zoom-controls">
      <button class="map-zoom-btn" id="map-zoom-in" type="button" aria-label="Zoom in">+</button>
      <button class="map-zoom-btn" id="map-zoom-out" type="button" aria-label="Zoom out">−</button>
    </div>
  </div>

  <!-- BOTTOM SHEET (Result Selected) -->
  <div class="bottom-sheet hidden expanded" id="bottom-sheet">
    <div class="sheet-handle-wrap" id="sheet-handle">
      <div class="sheet-handle"></div>
    </div>
    <div class="sheet-peek-area" id="sheet-peek-area">
      <div class="sheet-location-row">
        <h2 class="sheet-location-name">Garibaldi Lake TH</h2>
      </div>
    </div>
    <div class="sheet-body">
      <div class="sheet-coords">49.3756° N · 123.0378° W</div>
      <div class="sheet-weather-preview" id="sheet-weather-preview">
        <span class="sheet-weather-wind" id="sheet-weather-wind">—</span>
        <span class="sheet-weather-temp" id="sheet-weather-temp">—</span>
        <span class="sheet-weather-elev" id="sheet-weather-elev"></span>
      </div>
      <a href="forecast.html" class="sheet-cta" id="sheet-cta">View Forecast →</a>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <nav id="bottom-nav"></nav>

  </div><!-- .app-frame -->

</body>
</html>
