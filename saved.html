<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>Saved Spots — gusty.ca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@1,700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="gusty-settings.js"></script>
  <script>if(window.GustySettings)GustySettings.applyTheme();</script>
  <style>
    /* ============================================================
       GUSTY.CA DESIGN TOKENS
       ============================================================ */
    :root {
      --color-bg:          #0B1120;
      --color-surface:     #111827;
      --color-surface-elevated: #1A2333;
      --color-border:      rgba(255, 255, 255, 0.07);
      --color-border-strong: rgba(255, 255, 255, 0.13);

      --color-text-primary:   #F0F4F8;
      --color-text-secondary: #8A9BB0;
      --color-text-muted:     #4A5C72;
      --color-text-inverse:   #0B1120;

      --color-accent:         #38BDF8;
      --color-accent-dim:     rgba(56, 189, 248, 0.15);
      --color-accent-border:  rgba(56, 189, 248, 0.30);

      --wind-calm:      #34D399;
      --wind-light:     #A3E635;
      --wind-moderate:  #FBBF24;
      --wind-strong:    #F97316;
      --wind-severe:    #EF4444;
      --wind-extreme:   #C026D3;

      --color-go:       #34D399;
      --color-caution:  #FBBF24;
      --color-no-go:    #EF4444;

      --font-ui:   'Inter', system-ui, sans-serif;
      --font-data: 'DM Mono', 'Menlo', monospace;

      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-lg:   18px;
      --text-xl:   22px;

      --weight-regular:  400;
      --weight-medium:   500;
      --weight-semibold: 600;

      --tracking-tight:  -0.025em;
      --tracking-wide:    0.06em;

      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-16: 64px;

      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --radius-full: 999px;
    }

    html.theme-light {
      --color-bg:          #F5F7FA;
      --color-surface:     #FFFFFF;
      --color-surface-elevated: #E8ECF1;
      --color-border:      rgba(0, 0, 0, 0.08);
      --color-border-strong: rgba(0, 0, 0, 0.15);
      --color-text-primary:   #0B1120;
      --color-text-secondary: #4A5C72;
      --color-text-muted:     #8A9BB0;
      --color-text-inverse:   #F0F4F8;
    }

    /* ============================================================
       RESET + BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    .app-frame {
      margin: 0 auto;
      max-width: clamp(390px, 92vw, 980px);
      width: 100%;
      min-height: 100vh;
      position: relative;
      transform: translateZ(0);
      border-left: 1px solid rgba(255, 255, 255, 0.07);
      border-right: 1px solid rgba(255, 255, 255, 0.07);
      padding: var(--space-4);
      padding-bottom: calc(var(--space-16) + var(--space-4));
    }
    html.theme-light .app-frame {
      border-color: rgba(0, 0, 0, 0.08);
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .page-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: var(--space-6);
    }
    .wordmark {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-style: italic;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      font-size: 22px;
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
    }
    .page-title {
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text-primary);
    }
    .header-btn {
      background: none;
      border: none;
      color: var(--color-accent);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-medium);
      cursor: pointer;
      padding: var(--space-2);
      min-height: 44px;
      min-width: 44px;
    }

    /* ============================================================
       SPOT CARD
       ============================================================ */
    .spot-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      margin: 0;
      padding: 0;
    }
    .drop-indicator {
      height: 2px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 1px;
      margin: 4px 0;
      width: 100%;
      pointer-events: none;
      flex-shrink: 0;
      animation: dropIndicatorIn 0.15s ease-out;
    }
    @keyframes dropIndicatorIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .sortable-ghost {
      opacity: 0.4;
    }
    .sortable-chosen {
      cursor: grabbing;
    }
    .sortable-drag {
      opacity: 1;
    }
    .spot-card-wrapper {
      border-radius: var(--radius-md);
      transition: max-height 0.35s ease-out, opacity 0.25s ease-out, margin 0.35s ease-out;
    }
    .spot-card-wrapper.collapsing {
      max-height: 0;
      opacity: 0;
      margin-bottom: calc(-1 * var(--space-4));
      overflow: hidden;
    }
    .spot-card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: var(--space-3);
      cursor: pointer;
      position: relative;
    }
    .spot-drag-handle {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted);
      cursor: grab;
    }
    .spot-drag-handle:active {
      cursor: grabbing;
    }
    .spot-drag-handle svg {
      width: 20px;
      height: 20px;
    }
    .spot-card-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .spot-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text-primary);
      width: 100%;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .condition-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      align-self: flex-start;
    }
    .condition-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .badge-go {
      background: rgba(52, 211, 153, 0.15);
      color: var(--color-go);
      border: 1px solid rgba(52, 211, 153, 0.3);
    }
    .badge-caution {
      background: rgba(251, 191, 36, 0.15);
      color: var(--color-caution);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    .badge-no-go {
      background: rgba(239, 68, 68, 0.15);
      color: var(--color-no-go);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .spot-meta {
      font-size: var(--text-sm);
      font-family: var(--font-data);
      color: var(--color-text-muted);
    }
    .spot-wind-speed {
      font-family: var(--font-data);
      font-size: var(--text-lg);
      font-weight: var(--weight-medium);
    }
    .spot-wind-speed.wind-calm { color: var(--wind-calm); }
    .spot-wind-speed.wind-light { color: var(--wind-light); }
    .spot-wind-speed.wind-moderate { color: var(--wind-moderate); }
    .spot-wind-speed.wind-strong { color: var(--wind-strong); }
    .spot-wind-speed.wind-severe { color: var(--wind-severe); }
    .spot-wind-speed.wind-extreme { color: var(--wind-extreme); }
    /* Trash: desktop only, top-right, opacity 0 by default, 1 on card hover */
    .spot-delete-btn {
      position: absolute;
      top: var(--space-4);
      right: var(--space-4);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      padding: 0;
      border-radius: var(--radius-sm);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    @media (hover: hover) and (pointer: fine) {
      .spot-card:hover .spot-delete-btn {
        opacity: 1;
        pointer-events: auto;
      }
    }
    @media (min-width: 769px) {
      .spot-card {
        padding-right: 52px;
      }
    }
    @media (max-width: 768px) {
      .spot-delete-btn {
        display: none;
      }
    }
    .spot-delete-btn:hover {
      color: var(--color-no-go);
      background: rgba(239, 68, 68, 0.1);
    }
    .spot-delete-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }

    /* ============================================================
       EMPTY STATE
       ============================================================ */
    .empty-state {
      text-align: center;
      padding: var(--space-8) 0;
      color: var(--color-text-muted);
      font-size: var(--text-base);
      line-height: 1.5;
    }
    .empty-state.hidden {
      display: none;
    }

    /* ============================================================
       BOTTOM NAVIGATION
       ============================================================ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: var(--space-16);
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 var(--space-4);
      backdrop-filter: blur(12px);
      z-index: 20;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2);
      min-width: 44px;
      min-height: 44px;
      justify-content: center;
      text-decoration: none;
      color: var(--color-text-secondary);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
    }
    .nav-item.active {
      color: var(--color-accent);
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }
    .nav-item.active .nav-icon {
      background: var(--color-accent-dim);
      border-radius: 50%;
      padding: 4px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <div class="app-frame">

  <header class="page-header">
    <span class="wordmark">GUSTY</span>
    <h1 class="page-title">Saved Spots</h1>
  </header>

  <div class="empty-state" id="empty-state">No saved spots yet — search for a location to get started.</div>
  <div class="spot-list" id="spot-list"></div>

  <nav class="bottom-nav">
    <a href="forecast.html" class="nav-item">
      <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" /></svg></span>
      Location
    </a>
    <a href="search.html" class="nav-item">
      <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg></span>
      Search
    </a>
    <a href="saved.html" class="nav-item active">
      <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z" /></svg></span>
      Saved
    </a>
    <a href="settings.html" class="nav-item">
      <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg></span>
      Settings
    </a>

  </div><!-- .app-frame -->

  <script>
    (function() {
      var STORAGE_KEY = 'gusty_saved_spots';
      var spotList = document.getElementById('spot-list');
      var emptyState = document.getElementById('empty-state');

      function isCoordinateLike(str) {
        if (!str || typeof str !== 'string') return true;
        return str.indexOf('°') >= 0 || /^-?\d+\.?\d*\s*[,·]\s*-?\d+\.?\d*$/.test(str.trim());
      }

      function getSavedSpots() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          var spots = raw ? JSON.parse(raw) : [];
          var changed = false;
          spots.forEach(function(s) {
            if (s.name && isCoordinateLike(s.name)) {
              s.name = 'Location';
              changed = true;
            }
          });
          if (changed) setSavedSpots(spots);
          return spots;
        } catch (e) { return []; }
      }

      function setSavedSpots(arr) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
      }

      function buildForecastUrl(spot) {
        var p = new URLSearchParams({ lat: spot.lat, lng: spot.lng, name: spot.name || 'Location' });
        if (spot.elevation != null && !isNaN(spot.elevation)) p.set('elevation', spot.elevation);
        return 'forecast.html?' + p.toString();
      }

      function formatElevation(elev) {
        if (elev == null || isNaN(elev)) return '—';
        return Math.round(elev).toLocaleString() + ' m';
      }

      function getSpotDisplayData(spot) {
        var name = spot.name || 'Location';
        var hash = 0;
        for (var i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i) | 0;
        var h = Math.abs(hash);
        var condition = spot.condition || (h % 3 === 0 ? 'go' : h % 3 === 1 ? 'caution' : 'no-go');
        var windSpeed = spot.windSpeed != null ? spot.windSpeed : 18 + (h % 45);
        var conditionLabel = window.GustySettings ? GustySettings.getConditionDisplayLabel(windSpeed) : (condition === 'go' ? 'Favorable' : condition === 'caution' ? 'Marginal' : 'Unsafe');
        var windDir = spot.windDirection || ['N', 'NE', 'E', 'SE', 'S', 'SW', 'WSW', 'W', 'NW'][h % 9];
        var windClass = windSpeed < 20 ? 'wind-calm' : windSpeed < 35 ? 'wind-light' : windSpeed < 50 ? 'wind-moderate' : windSpeed < 70 ? 'wind-strong' : windSpeed < 90 ? 'wind-severe' : 'wind-extreme';
        var windDisp = window.GustySettings ? GustySettings.convertWindForDisplay(windSpeed) : windSpeed;
        var windUnit = window.GustySettings ? GustySettings.getWindUnit() : 'km/h';
        return { condition, conditionLabel, windDir, windSpeed, windDisp, windUnit, windClass };
      }

      function renderSpots() {
        var spots = getSavedSpots();
        emptyState.classList.toggle('hidden', spots.length > 0);
        spotList.innerHTML = '';

        spots.forEach(function(spot) {
          var d = getSpotDisplayData(spot);
          var wrapper = document.createElement('div');
          wrapper.className = 'spot-card-wrapper';
          var url = buildForecastUrl(spot);
          var displayName = (spot.name || 'Location').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          wrapper.innerHTML =
            '<div class="spot-card" data-lat="' + spot.lat + '" data-lng="' + spot.lng + '">' +
            '  <div class="spot-drag-handle" aria-label="Drag to reorder">' +
            '    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>' +
            '  </div>' +
            '  <div class="spot-card-content">' +
            '    <span class="spot-name">' + displayName + '</span>' +
            '    <span class="condition-badge badge-' + d.condition + '"><span class="dot"></span>' + d.conditionLabel + '</span>' +
            '    <div class="spot-meta">' + formatElevation(spot.elevation) + ' · ' + d.windDir + '</div>' +
            '    <div class="spot-wind-speed ' + d.windClass + '">' + d.windDisp + ' <span style="color:var(--color-text-secondary);font-size:var(--text-sm)">' + d.windUnit + '</span></div>' +
            '  </div>' +
            '  <button class="spot-delete-btn" type="button" aria-label="Delete spot">' +
            '    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>' +
            '  </button>' +
            '</div>';
          spotList.appendChild(wrapper);

          var card = wrapper.querySelector('.spot-card');
          card.addEventListener('click', function(e) {
            if (e.target.closest('.spot-delete-btn')) return;
            if (e.target.closest('.spot-drag-handle')) return;
            window.location.href = url;
          });

          wrapper.querySelector('.spot-delete-btn').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            var spots = getSavedSpots();
            var key = function(s) { return Math.round(s.lat * 10000) / 10000 + ',' + Math.round(s.lng * 10000) / 10000; };
            var spotKey = key(spot);
            spots = spots.filter(function(s) { return key(s) !== spotKey; });
            setSavedSpots(spots);
            wrapper.style.maxHeight = wrapper.offsetHeight + 'px';
            wrapper.offsetHeight;
            wrapper.classList.add('collapsing');
            setTimeout(function() {
              wrapper.remove();
              emptyState.classList.toggle('hidden', getSavedSpots().length > 0);
            }, 350);
          });
        });

        if (typeof Sortable !== 'undefined' && spots.length > 1) {
          new Sortable(spotList, {
            handle: '.spot-drag-handle',
            draggable: '.spot-card-wrapper',
            animation: 150,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            dragClass: 'sortable-drag',
            onMove: function(evt) {
              var existing = spotList.querySelector('.drop-indicator');
              if (existing) existing.remove();
              var indicator = document.createElement('div');
              indicator.className = 'drop-indicator';
              var related = evt.related;
              if (evt.willInsertAfter) {
                spotList.insertBefore(indicator, related.nextSibling);
              } else {
                spotList.insertBefore(indicator, related);
              }
            },
            onEnd: function() {
              var existing = spotList.querySelector('.drop-indicator');
              if (existing) existing.remove();
              var wrappers = spotList.querySelectorAll('.spot-card-wrapper');
              var order = [];
              wrappers.forEach(function(w) {
                var card = w.querySelector('.spot-card');
                if (card) {
                  var lat = parseFloat(card.dataset.lat);
                  var lng = parseFloat(card.dataset.lng);
                  var spots = getSavedSpots();
                  var found = spots.find(function(s) { return Math.abs(s.lat - lat) < 0.0001 && Math.abs(s.lng - lng) < 0.0001; });
                  if (found) order.push(found);
                }
              });
              setSavedSpots(order);
            }
          });
        }
      }

      renderSpots();
    })();
  </script>
</body>
</html>
