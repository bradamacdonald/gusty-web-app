name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build
        env:
          VITE_MAPBOX_TOKEN: pk.ci_placeholder_token
          VITE_GEONAMES_USERNAME: ci_placeholder_user
