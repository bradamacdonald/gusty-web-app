<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gusty — Mountain Wind Forecasts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080E1A;
      --surface: #0F1A2E;
      --accent: #38BDF8;
      --accent-dim: rgba(56, 189, 248, 0.12);
      --text-primary: #F0F4F8;
      --text-muted: #3A4F66;
      --text-secondary: #6B84A0;
      --wind-calm: #34D399;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOPO SVG BACKGROUND ── */
    .topo-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .topo-bg svg {
      width: 100%;
      height: 100%;
    }

    /* ── GRADIENT OVERLAY ── */
    .gradient-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 80% 60% at 50% 110%, rgba(56, 189, 248, 0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(52, 211, 153, 0.05) 0%, transparent 60%),
        linear-gradient(to bottom, rgba(8,14,26,0.1) 0%, rgba(8,14,26,0.5) 50%, rgba(8,14,26,0.92) 100%);
      pointer-events: none;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 80px;
      text-align: center;
    }

    /* ── WORDMARK ── */
    .wordmark {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-style: italic;
      font-size: clamp(72px, 18vw, 140px);
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: var(--text-primary);
      line-height: 0.9;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .wordmark span {
      color: var(--accent);
    }

    /* ── TAGLINE ── */
    .tagline {
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    /* ── WIND STATS STRIP ── */
    .stats-strip {
      display: flex;
      gap: 1px;
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.45s forwards;
    }

    .stat-cell {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 80px;
    }

    .stat-cell:first-child { border-radius: 10px 0 0 10px; }
    .stat-cell:last-child { border-radius: 0 10px 10px 0; }

    .stat-value {
      font-family: 'Barlow', monospace;
      font-size: 22px;
      font-weight: 700;
      font-style: italic;
      color: var(--wind-calm);
      letter-spacing: -0.02em;
    }

    .stat-value.moderate { color: #FBBF24; }
    .stat-value.strong { color: #F97316; }

    .stat-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── CTA BUTTON ── */
    .cta-wrap {
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #080E1A;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-style: italic;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 999px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.25);
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 60px rgba(56, 189, 248, 0.4);
      background: #7DD3F8;
    }

    .cta-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      transition: transform 0.15s ease;
    }

    .cta-btn:hover svg {
      transform: translateX(3px);
    }

    /* ── BOTTOM CAPTION ── */
    .caption {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      animation: fadeUpCaption 0.8s ease 0.9s forwards;
      z-index: 3;
    }
    @keyframes fadeUpCaption {
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    /* ── ANIMATED WIND PATHS ── */
    .topo-bg svg path {
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
    }
    .topo-bg svg path:nth-child(odd) {
      animation: flowWind 8s ease-in-out infinite;
    }
    .topo-bg svg path:nth-child(even) {
      animation: flowWind 10s ease-in-out 1.5s infinite;
    }
    .topo-bg svg path:nth-child(3n) {
      animation: flowWind 12s ease-in-out 3s infinite;
    }
    .topo-bg svg path:nth-child(5n) {
      animation: flowWind 9s ease-in-out 4.5s infinite;
    }

    @keyframes flowWind {
      0%   { stroke-dashoffset: 1200; opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { stroke-dashoffset: -1200; opacity: 0; }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .stats-strip {
        gap: 1px;
      }
      .stat-cell {
        min-width: 64px;
        padding: 12px 14px;
      }
      .stat-value { font-size: 18px; }
    }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <!-- Topographic background -->
  <div class="topo-bg">

      <defs>
        <style>
          .w { fill: none; stroke-linecap: round; }
        </style>
      </defs>

      <path class="w" stroke="rgba(56,189,248,0.12)" stroke-width="1.2"

      <path class="w" stroke="rgba(56,189,248,0.07)" stroke-width="0.8"

      <path class="w" stroke="rgba(56,189,248,0.16)" stroke-width="1.4"

      <path class="w" stroke="rgba(56,189,248,0.09)" stroke-width="0.9"

      <path class="w" stroke="rgba(56,189,248,0.18)" stroke-width="1.5"
        d="M -40,390 C 100,364 240,408 420,390 C 600,372 680,322 860,338 C 1040,354 1120,402 1280,382 C 1380,368 1420,348 1440,352"/>
      <path class="w" stroke="rgba(56,189,248,0.08)" stroke-width="0.8"
        d="M -40,450 C 80,428 200,468 380,450 C 560,432 660,388 840,402 C 1020,416 1120,462 1280,444 C 1380,432 1420,414 1440,418"/>
      <path class="w" stroke="rgba(56,189,248,0.13)" stroke-width="1.1"
        d="M -40,520 C 120,494 260,540 440,520 C 620,500 720,452 900,468 C 1080,484 1160,534 1320,514 C 1400,504 1430,488 1440,492"/>
      <path class="w" stroke="rgba(56,189,248,0.07)" stroke-width="0.7"
        d="M -40,580 C 100,558 220,596 400,578 C 580,560 680,516 860,530 C 1040,544 1140,592 1300,572 C 1390,560 1428,544 1440,548"/>
      <path class="w" stroke="rgba(56,189,248,0.15)" stroke-width="1.3"
        d="M -40,650 C 140,622 280,670 460,650 C 640,630 740,578 920,594 C 1100,610 1200,662 1360,640 C 1410,632 1432,620 1440,624"/>
      <path class="w" stroke="rgba(56,189,248,0.06)" stroke-width="0.7"
        d="M -40,720 C 120,696 260,740 440,720 C 620,700 720,654 900,668 C 1080,682 1180,730 1340,710 C 1400,702 1428,690 1440,694"/>
      <path class="w" stroke="rgba(56,189,248,0.10)" stroke-width="0.9"
        d="M -40,790 C 100,768 240,808 420,788 C 600,768 700,722 880,736 C 1060,750 1160,800 1320,778 C 1400,768 1428,754 1440,758"/>
    </svg>
  </div>

  <!-- Gradient overlay -->
  <div class="gradient-overlay"></div>

  <!-- Main content -->
  <main class="page">

    <h1 class="wordmark">GUSTY</h1>

    <p class="tagline">Mountain wind forecasts for people who go outside</p>

    <div class="stats-strip">
      <div class="stat-cell">
        <span class="stat-value">6</span>
        <span class="stat-label">km/h</span>
      </div>
      <div class="stat-cell">
        <span class="stat-value moderate">28</span>
        <span class="stat-label">Gusts</span>
      </div>
      <div class="stat-cell">
        <span class="stat-value">WSW</span>
        <span class="stat-label">Dir</span>
      </div>
      <div class="stat-cell">
        <span class="stat-value strong">−4°</span>
        <span class="stat-label">Temp</span>
      </div>
      <div class="stat-cell">
        <span class="stat-value">1,580</span>
        <span class="stat-label">Elev m</span>
      </div>
    </div>

    <div class="cta-wrap">
      <a href="forecast.html" class="cta-btn">
        Check the wind
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
        </svg>
      </a>
    </div>

  </main>

  <p class="caption">gusty.ca &nbsp;·&nbsp; BC backcountry &nbsp;·&nbsp; open-meteo powered</p>

</body>
</html>
