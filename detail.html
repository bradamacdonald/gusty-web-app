<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>Model Detail — gusty.ca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@1,700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
  <script type="module" src="/src/app/routes/detail.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<div class="app-frame">

  <header class="top-bar">
    <a href="forecast.html" class="back-btn" id="back-btn" aria-label="Back">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
    </a>
    <a href="search.html" class="wordmark">GUSTY</a>
    <select class="model-select" id="model-select" aria-label="Select model">
      <option value="ECMWF">ECMWF</option>
      <option value="GFS">GFS</option>
      <option value="GEM">GEM</option>
      <option value="HRRR">HRRR</option>
    </select>
  </header>

  <div class="location-row">
    <span class="location-name">Garibaldi Lake TH</span>
    <span class="elevation-chip" id="elevation-chip">—</span>
    <span class="location-updated">Updated 2h ago</span>
  </div>

  <div class="chart-section">
    <div class="chart-scroll" id="chart-scroll">
      <div class="chart-scroll-inner" style="width: var(--chart-width); min-width: var(--chart-width);">
        <div class="date-header" id="date-header"></div>
        <div class="time-axis-wrap">
          <div class="time-axis" id="time-axis"></div>
          <div class="time-cursor-wrap">
            <div class="time-cursor"></div>
          </div>
        </div>
        <div class="chart-blocks-inner">
        <div class="chart-block">
          <div class="chart-label">Wind & Gusts</div>
          <div class="chart-legend-row">
            <span class="chart-swatch"><span class="chart-swatch-sq" style="background:var(--wind-strong)"></span>Summit</span>
            <span class="chart-swatch"><span class="chart-swatch-sq" style="background:var(--wind-moderate)"></span>Mid</span>
            <span class="chart-swatch"><span class="chart-swatch-sq" style="background:var(--wind-calm)"></span>Trailhead</span>
          </div>
          <div class="chart-container">
            <canvas id="wind-chart" width="1100" height="180"></canvas>
          </div>
        </div>
        <div class="chart-block">
          <div class="chart-label">Temperature & Freezing Level</div>
          <div class="chart-subtitle">All values in °C</div>
          <div class="chart-legend-row">
            <span class="chart-swatch" style="color:var(--color-accent)"><span class="chart-swatch-line solid"></span>Temp</span>
            <span class="chart-swatch" style="color:var(--color-text-secondary)"><span class="chart-swatch-line dashed"></span>Dew Point</span>
            <span class="chart-swatch" style="color:var(--color-text-muted)"><span class="chart-swatch-line dashed"></span>Freezing Level</span>
          </div>
          <div class="chart-container">
            <canvas id="temp-chart" width="1100" height="180"></canvas>
          </div>
        </div>
        <div class="chart-block">
          <div class="chart-label">Precipitation</div>
          <div class="precip-legend">
            <span class="precip-swatch"><span class="precip-swatch-sq" style="background:rgba(96,165,250,0.85)"></span>Rain</span>
            <span class="precip-swatch"><span class="precip-swatch-sq" style="background:rgba(226,232,240,0.70)"></span>Snow</span>
            <span class="precip-swatch" style="color:var(--color-accent)"><span class="chart-swatch-line solid"></span>Cumulative</span>
          </div>
          <div class="chart-container">
            <canvas id="precip-chart" width="1100" height="180"></canvas>
          </div>
        </div>
      </div>
      </div>
    </div>
  </div>

  <nav id="bottom-nav"></nav>

  </div><!-- .app-frame -->

</body>
</html>
