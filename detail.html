<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Detail — gusty.ca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
  <style>
    /* ============================================================
       GUSTY.CA DESIGN TOKENS
       ============================================================ */
    :root {
      --color-bg:          #0B1120;
      --color-surface:     #111827;
      --color-surface-elevated: #1A2333;
      --color-border:      rgba(255, 255, 255, 0.07);
      --color-border-strong: rgba(255, 255, 255, 0.13);

      --color-text-primary:   #F0F4F8;
      --color-text-secondary: #8A9BB0;
      --color-text-muted:     #4A5C72;

      --color-accent:         #38BDF8;
      --color-accent-dim:     rgba(56, 189, 248, 0.15);
      --color-accent-border:  rgba(56, 189, 248, 0.30);

      --wind-calm:      #34D399;
      --wind-light:     #A3E635;
      --wind-moderate:  #FBBF24;
      --wind-strong:    #F97316;
      --wind-severe:    #EF4444;
      --wind-extreme:   #C026D3;

      --precip-light:   rgba(147, 197, 253, 0.55);
      --precip-heavy:   rgba(96, 165, 250, 0.85);
      --precip-snow:    rgba(226, 232, 240, 0.70);

      --font-ui:   'Inter', system-ui, sans-serif;
      --font-data: 'DM Mono', 'Menlo', monospace;

      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-lg:   18px;
      --text-xl:   22px;

      --weight-medium:   500;
      --weight-semibold: 600;

      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-16: 64px;

      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-full: 999px;

      --chart-height: 180px;
      --chart-width: 1100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100vh;
      max-width: 390px;
      margin: 0 auto;
      padding-bottom: var(--space-16);
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      border-bottom: 1px solid var(--color-border);
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      padding: var(--space-2);
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }
    .top-bar-title {
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: var(--color-text-primary);
    }
    .model-chip {
      padding: 6px var(--space-3);
      border-radius: var(--radius-full);
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      font-family: var(--font-data);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
    .model-chip svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
    }

    /* LOCATION ROW */
    .location-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      flex-wrap: wrap;
    }
    .location-name {
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      color: var(--color-text-primary);
    }
    .elevation-chip {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      font-family: var(--font-data);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
    }
    .location-updated {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-left: auto;
    }

    /* CHART SECTION */
    .chart-section {
      border-bottom: 1px solid var(--color-border);
    }
    .time-axis-section {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: 0 var(--space-4) var(--space-2);
    }
    .chart-scroll {
      overflow-x: scroll;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .chart-scroll::-webkit-scrollbar { display: none; }
    .chart-scroll-inner {
      width: var(--chart-width);
      min-width: var(--chart-width);
      position: relative;
    }
    .time-axis-wrap {
      position: relative;
      width: var(--chart-width);
      min-width: var(--chart-width);
    }
    .time-axis {
      display: flex;
      padding: var(--space-2) 0;
      width: var(--chart-width);
    }
    .time-tick {
      flex: 1;
      font-family: var(--font-data);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-align: center;
      min-width: 0;
    }
    .time-cursor-wrap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 10;
    }
    .time-cursor {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-accent);
      left: calc((1 / 24) * 100%);
      transform: translateX(-50%);
    }

    /* CHART CONTAINERS */
    .chart-block {
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .chart-block:last-child {
      padding-bottom: var(--space-4);
    }
    .chart-blocks-scroll {
      padding: 0 var(--space-4) var(--space-4);
    }
    .chart-blocks-inner {
      width: var(--chart-width);
      min-width: var(--chart-width);
    }
    .chart-label {
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
    }
    .chart-container {
      position: relative;
      height: var(--chart-height);
      width: var(--chart-width);
    }
    .chart-legend-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0 var(--space-3);
      margin-bottom: var(--space-2);
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }
    .chart-swatch {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
    }
    .chart-swatch-sq {
      width: 6px;
      height: 6px;
      border-radius: 1px;
    }
    .chart-swatch-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .chart-swatch-circle {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      background: transparent;
      box-sizing: border-box;
    }
    .chart-swatch-line {
      width: 12px;
      flex-shrink: 0;
    }
    .chart-swatch-line.solid {
      height: 2px;
      background: currentColor;
    }
    .chart-swatch-line.dashed {
      height: 0;
      border-bottom: 2px dashed currentColor;
    }
    .chart-legend-gusts {
      color: var(--color-text-muted);
    }
    .chart-subtitle {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
      margin-bottom: var(--space-2);
    }
    .precip-swatch {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-right: var(--space-4);
    }
    .precip-swatch:last-child {
      margin-right: 0;
    }
    .precip-swatch-sq {
      width: 6px;
      height: 6px;
      border-radius: 1px;
    }
    .precip-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0 var(--space-4);
      margin-bottom: var(--space-2);
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      height: var(--space-16);
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 var(--space-4);
      backdrop-filter: blur(12px);
      z-index: 20;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2);
      min-width: 44px;
      min-height: 44px;
      justify-content: center;
      text-decoration: none;
      color: var(--color-text-secondary);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
    }
    .nav-item.active { color: var(--color-accent); }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }
    .nav-item.active .nav-icon {
      background: var(--color-accent-dim);
      border-radius: 50%;
      padding: 4px;
    }
  </style>
</head>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var lat = parseFloat(params.get('lat')) || 49.3756;
      var lng = parseFloat(params.get('lng')) || -123.0378;
      var elevation = parseInt(params.get('elevation'), 10) || 1580;
      var locationName = params.get('name') ? decodeURIComponent(params.get('name')) : 'Garibaldi Lake TH';
      var urlModel = params.get('model') || '';

      var MODELS = [
        { name: 'ECMWF', api: 'ecmwf_ifs025' },
        { name: 'GFS', api: 'gfs_seamless' },
        { name: 'GEM', api: 'gem_seamless' },
        { name: 'HRDPS 1km', api: 'gem_seamless' }
      ];
      var modelIdx = 0;
      if (urlModel) {
        var mi = MODELS.findIndex(function(m) { return m.name === urlModel; });
        if (mi >= 0) modelIdx = mi;
      }

      document.querySelector('.location-name').textContent = locationName;
      document.querySelector('.elevation-chip').textContent = elevation.toLocaleString() + ' m';
      var backBtn = document.getElementById('back-btn');
      if (backBtn) {
        backBtn.href = 'forecast.html?' + new URLSearchParams({ lat: lat, lng: lng, elevation: elevation, name: locationName }).toString();
      }

      var CHART_OPTS = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.07)' }, ticks: { color: '#4A5C72', font: { size: 10, family: "'DM Mono'" }, maxRotation: 0 } },
          y: { grid: { color: 'rgba(255,255,255,0.07)' }, ticks: { color: '#4A5C72', font: { size: 10, family: "'DM Mono'" } } }
        }
      };

      var labels = ['6am','8am','10am','12pm','2pm','4pm','6pm','8pm','10pm','12am','2am','4am','Tue 6am','Tue 8am','Tue 10am','Tue 12pm','Tue 2pm','Tue 4pm','Tue 6pm','Tue 8pm','Tue 10pm','Tue 12am','Tue 2am','Tue 4am'];

      var timeAxisEl = document.getElementById('time-axis');
      timeAxisEl.innerHTML = '';
      labels.forEach(function(l) {
        var span = document.createElement('span');
        span.className = 'time-tick';
        span.textContent = l;
        timeAxisEl.appendChild(span);
      });

      var windData = { summit: [], mid: [], trailhead: [], gustsSummit: [], gustsMid: [], gustsTrailhead: [] };
      var tempData = { temp: [], dewPoint: [], freezing: [] };
      var precipData = { cloud: [], rain: [], snow: [] };

      function formatLabel(iso) {
        var d = new Date(iso);
        var h = d.getHours();
        var day = d.getDate();
        var prev = new Date(d);
        prev.setDate(prev.getDate() - 1);
        var prefix = d.getDate() !== new Date().getDate() ? 'Tue ' : '';
        return prefix + (h === 0 ? '12am' : h === 12 ? '12pm' : h < 12 ? h + 'am' : (h - 12) + 'pm');
      }

      function fetchForecast(modelApi, elev) {
        var p = new URLSearchParams({
          latitude: lat,
          longitude: lng,
          elevation: elev || elevation,
          hourly: 'windspeed_10m,windgusts_10m,temperature_2m,dewpoint_2m,precipitation,cloudcover',
          wind_speed_unit: 'kmh',
          timezone: 'America/Vancouver',
          forecast_days: 2,
          models: modelApi
        });
        return fetch('https://api.open-meteo.com/v1/forecast?' + p).then(function(r) { return r.json(); });
      }

      function extractHourly(arr, len) {
        if (!arr) return [];
        return arr.slice(0, len).map(function(v) { return v != null ? v : 0; });
      }

      function loadModelData() {
        var model = MODELS[modelIdx];
        document.getElementById('model-title').textContent = model.name;
        document.getElementById('model-chip-text').textContent = MODELS[(modelIdx + 1) % MODELS.length].name;
        document.getElementById('model-chip').disabled = true;

        var elevTrail = elevation;
        var elevMid = elevation + 350;
        var elevSummit = elevation + 700;

        Promise.all([
          fetchForecast(model.api, elevSummit),
          fetchForecast(model.api, elevMid),
          fetchForecast(model.api, elevTrail),
          fetchForecast(model.api, elevation)
        ]).then(function(results) {
          var windSummit = results[0].hourly;
          var windMid = results[1].hourly;
          var windTrail = results[2].hourly;
          var main = results[3].hourly;
          var len = Math.min(24, main.time.length);

          windData.summit = extractHourly(windSummit.windspeed_10m, len);
          windData.mid = extractHourly(windMid.windspeed_10m, len);
          windData.trailhead = extractHourly(windTrail.windspeed_10m, len);
          windData.gustsSummit = extractHourly(windSummit.windgusts_10m, len);
          windData.gustsMid = extractHourly(windMid.windgusts_10m, len);
          windData.gustsTrailhead = extractHourly(windTrail.windgusts_10m, len);

          tempData.temp = extractHourly(main.temperature_2m, len);
          tempData.dewPoint = extractHourly(main.dewpoint_2m, len);
          tempData.freezing = tempData.temp.map(function(t, i) {
            return elevation + Math.max(0, -t * 120);
          });

          precipData.cloud = extractHourly(main.cloudcover, len);
          var precip = extractHourly(main.precipitation, len);
          precipData.rain = tempData.temp.map(function(t, i) { return t >= 0 ? (precip[i] || 0) : 0; });
          precipData.snow = tempData.temp.map(function(t, i) { return t < 0 ? (precip[i] || 0) / 10 : 0; });

          if (main.time && main.time.length >= len) {
            for (var i = 0; i < len; i++) labels[i] = formatLabel(main.time[i]);
            for (var j = 0; j < len && j < timeAxisEl.children.length; j++) {
              timeAxisEl.children[j].textContent = labels[j];
            }
          }

          windChart.data.datasets[0].data = windData.summit;
          windChart.data.datasets[1].data = windData.mid;
          windChart.data.datasets[2].data = windData.trailhead;
          windChart.data.labels = labels;
          windChart.update('none');

          tempChart.data.datasets[0].data = tempData.temp;
          tempChart.data.datasets[1].data = tempData.dewPoint;
          tempChart.data.datasets[2].data = tempData.freezing;
          tempChart.data.labels = labels;
          tempChart.update('none');

          precipChart.data.datasets[0].data = precipData.cloud;
          precipChart.data.datasets[1].data = precipData.rain;
          precipChart.data.datasets[2].data = precipData.snow;
          precipChart.data.labels = labels;
          precipChart.update('none');
        }).catch(function(err) {
          console.error('Fetch error:', err);
        }).finally(function() {
          document.getElementById('model-chip').disabled = false;
        });
      }

      var windChart = new Chart(document.getElementById('wind-chart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'Summit', data: windData.summit, borderColor: '#F97316', backgroundColor: 'transparent', borderWidth: 2, tension: 0.3, pointRadius: 0 },
            { label: 'Mid', data: windData.mid, borderColor: '#FBBF24', backgroundColor: 'transparent', borderWidth: 2, tension: 0.3, pointRadius: 0 },
            { label: 'Trailhead', data: windData.trailhead, borderColor: '#34D399', backgroundColor: 'transparent', borderWidth: 2, tension: 0.3, pointRadius: 0 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index' },
          hover: { mode: 'index' },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: function(items) { return items[0] && items[0].label ? items[0].label : ''; },
                label: function(ctx) {
                  var i = ctx.dataIndex;
                  var gust = ctx.datasetIndex === 0 ? windData.gustsSummit[i] : ctx.datasetIndex === 1 ? windData.gustsMid[i] : windData.gustsTrailhead[i];
                  return ctx.dataset.label + ': ' + ctx.formattedValue + ' km/h (gusts ' + (gust != null ? Math.round(gust) : '—') + ')';
                }
              },
              usePointStyle: true,
              boxPadding: 4
            }
          },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.07)' }, ticks: { color: '#4A5C72', font: { size: 10, family: "'DM Mono'" }, maxRotation: 0 } },
            y: { grid: { color: 'rgba(255,255,255,0.07)' }, ticks: { color: '#4A5C72', font: { size: 10, family: "'DM Mono'" } }, min: 0, max: 120 }
          }
        }
      });

      var tempChart = new Chart(document.getElementById('temp-chart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'Temp', data: tempData.temp, borderColor: '#38BDF8', backgroundColor: 'transparent', borderWidth: 2, tension: 0.3, pointRadius: 0 },
            { label: 'Dew Point', data: tempData.dewPoint, borderColor: '#8A9BB0', backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [4,4], tension: 0.3, pointRadius: 0 },
            { label: 'Freezing', data: tempData.freezing, borderColor: '#4A5C72', backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [4,4], tension: 0.3, pointRadius: 0, yAxisID: 'y1' }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: CHART_OPTS.scales.x,
            y: { ...CHART_OPTS.scales.y, position: 'left', min: -15, max: 10 },
            y1: { ...CHART_OPTS.scales.y, position: 'right', min: 1500, max: 2200, grid: { drawOnChartArea: false } }
          }
        }
      });

      var precipChart = new Chart(document.getElementById('precip-chart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Cloud', data: precipData.cloud, type: 'line', borderColor: 'rgba(255,255,255,0.08)', backgroundColor: 'rgba(255,255,255,0.04)', fill: true, tension: 0.3, pointRadius: 0, yAxisID: 'yCloud', order: 0 },
            { label: 'Rain', data: precipData.rain, backgroundColor: 'rgba(96, 165, 250, 0.85)', borderWidth: 0, stack: 'precip', order: 2 },
            { label: 'Snow', data: precipData.snow, backgroundColor: 'rgba(226, 232, 240, 0.70)', borderWidth: 0, stack: 'precip', order: 1 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: CHART_OPTS.scales.x,
            y: { ...CHART_OPTS.scales.y, position: 'left', stacked: true, min: 0, max: 2 },
            yCloud: { ...CHART_OPTS.scales.y, position: 'right', min: 0, max: 100, grid: { drawOnChartArea: false } }
          },
          datasets: { bar: { barPercentage: 0.8, categoryPercentage: 0.9 } }
        }
      });

      document.getElementById('model-chip').addEventListener('click', function() {
        modelIdx = (modelIdx + 1) % MODELS.length;
        loadModelData();
      });

      loadModelData();

      var timeScroll = document.getElementById('time-scroll');
      var chartsScroll = document.getElementById('charts-scroll');
      function syncScroll(from, to) {
        to.scrollLeft = from.scrollLeft;
      }
      timeScroll.addEventListener('scroll', function() { syncScroll(timeScroll, chartsScroll); });
      chartsScroll.addEventListener('scroll', function() { syncScroll(chartsScroll, timeScroll); });
    })();
  </script>
</body>
</html>
