<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Detail — gusty.ca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@1,700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
  <script src="gusty-settings.js"></script>
  <script>if(window.GustySettings)GustySettings.applyTheme();</script>
  <style>
    /* ============================================================
       GUSTY.CA DESIGN TOKENS
       ============================================================ */
    :root {
      --color-bg:          #0B1120;
      --color-surface:     #111827;
      --color-surface-elevated: #1A2333;
      --color-border:      rgba(255, 255, 255, 0.07);
      --color-border-strong: rgba(255, 255, 255, 0.13);

      --color-text-primary:   #F0F4F8;
      --color-text-secondary: #8A9BB0;
      --color-text-muted:     #4A5C72;

      --color-accent:         #38BDF8;
      --color-accent-dim:     rgba(56, 189, 248, 0.15);
      --color-accent-border:  rgba(56, 189, 248, 0.30);

      --wind-calm:      #34D399;
      --wind-light:     #A3E635;
      --wind-moderate:  #FBBF24;
      --wind-strong:    #F97316;
      --wind-severe:    #EF4444;
      --wind-extreme:   #C026D3;

      --precip-light:   rgba(147, 197, 253, 0.55);
      --precip-heavy:   rgba(96, 165, 250, 0.85);
      --precip-snow:    rgba(226, 232, 240, 0.70);

      --font-ui:   'Inter', system-ui, sans-serif;
      --font-data: 'DM Mono', 'Menlo', monospace;

      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-lg:   18px;
      --text-xl:   22px;

      --weight-medium:   500;
      --weight-semibold: 600;

      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-16: 64px;

      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-full: 999px;

      --chart-height: 180px;
      --chart-width: 1100px;
    }

    html.theme-light {
      --color-bg:          #F5F7FA;
      --color-surface:     #FFFFFF;
      --color-surface-elevated: #E8ECF1;
      --color-border:      rgba(0, 0, 0, 0.08);
      --color-border-strong: rgba(0, 0, 0, 0.15);
      --color-text-primary:   #0B1120;
      --color-text-secondary: #4A5C72;
      --color-text-muted:     #8A9BB0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    .app-frame {
      margin: 0 auto;
      max-width: 390px;
      width: 100%;
      min-height: 100vh;
      position: relative;
      transform: translateZ(0);
      border-left: 1px solid rgba(255, 255, 255, 0.07);
      border-right: 1px solid rgba(255, 255, 255, 0.07);
      padding-bottom: var(--space-16);
    }
    html.theme-light .app-frame {
      border-color: rgba(0, 0, 0, 0.08);
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      border-bottom: 1px solid var(--color-border);
    }
    .wordmark {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-style: italic;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      font-size: 22px;
      color: var(--color-text-primary);
      text-decoration: none;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      padding: var(--space-2);
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }
    .top-bar-title {
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: var(--color-text-primary);
    }
    .model-select {
      background: #1A2333;
      border: 1px solid rgba(255, 255, 255, 0.13);
      color: #F0F4F8;
      border-radius: 10px;
      padding: 6px var(--space-3);
      font-family: var(--font-data);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      cursor: pointer;
      min-width: 100px;
    }
    .model-select:focus {
      outline: none;
      border-color: var(--color-accent-border);
    }

    /* LOCATION ROW */
    .location-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      flex-wrap: wrap;
    }
    .location-name {
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      color: var(--color-text-primary);
    }
    .elevation-chip {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      font-family: var(--font-data);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
    }
    .location-updated {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-left: auto;
    }

    /* CHART SECTION */
    .chart-section {
      border-bottom: 1px solid var(--color-border);
    }
    .date-header {
      font-size: 11px;
      color: var(--color-text-muted);
      font-family: var(--font-data);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .chart-scroll {
      overflow-x: scroll;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .chart-scroll::-webkit-scrollbar { display: none; }
    .chart-scroll-inner {
      width: var(--chart-width);
      min-width: var(--chart-width);
      position: relative;
    }
    .time-axis-wrap {
      position: relative;
      width: var(--chart-width);
      min-width: var(--chart-width);
    }
    .time-axis {
      display: flex;
      padding: var(--space-2) 0;
      width: var(--chart-width);
    }
    .time-tick {
      flex: 1;
      font-family: var(--font-data);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-align: center;
      min-width: 0;
    }
    .time-cursor-wrap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 10;
    }
    .time-cursor {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-accent);
      left: calc((1 / 48) * 100%);
      transform: translateX(-50%);
    }

    /* CHART CONTAINERS */
    .chart-block {
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .chart-block:last-child {
      padding-bottom: var(--space-4);
    }
    .chart-scroll {
      padding: 0 var(--space-4) var(--space-4);
    }
    .chart-blocks-inner {
      width: var(--chart-width);
      min-width: var(--chart-width);
    }
    .chart-label {
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
    }
    .chart-container {
      position: relative;
      height: var(--chart-height);
      width: var(--chart-width);
    }
    .chart-container canvas {
      display: block;
      width: var(--chart-width);
      height: var(--chart-height);
    }
    .chart-legend-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0 var(--space-3);
      margin-bottom: var(--space-2);
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }
    .chart-swatch {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
    }
    .chart-swatch-sq {
      width: 6px;
      height: 6px;
      border-radius: 1px;
    }
    .chart-swatch-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .chart-swatch-circle {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      background: transparent;
      box-sizing: border-box;
    }
    .chart-swatch-line {
      width: 12px;
      flex-shrink: 0;
    }
    .chart-swatch-line.solid {
      height: 2px;
      background: currentColor;
    }
    .chart-swatch-line.dashed {
      height: 0;
      border-bottom: 2px dashed currentColor;
    }
    .chart-legend-gusts {
      color: var(--color-text-muted);
    }
    .chart-subtitle {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
      margin-bottom: var(--space-2);
    }
    .precip-swatch {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-right: var(--space-4);
    }
    .precip-swatch:last-child {
      margin-right: 0;
    }
    .precip-swatch-sq {
      width: 6px;
      height: 6px;
      border-radius: 1px;
    }
    .precip-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0 var(--space-4);
      margin-bottom: var(--space-2);
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: var(--space-16);
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 var(--space-4);
      backdrop-filter: blur(12px);
      z-index: 20;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2);
      min-width: 44px;
      min-height: 44px;
      justify-content: center;
      text-decoration: none;
      color: var(--color-text-secondary);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
    }
    .nav-item.active { color: var(--color-accent); }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }
    .nav-item.active .nav-icon {
      background: var(--color-accent-dim);
      border-radius: 50%;
      padding: 4px;
    }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <div class="app-frame">

  <header class="top-bar">
    <a href="forecast.html" class="back-btn" id="back-btn" aria-label="Back">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>

  <div class="chart-section">
    <div class="chart-scroll" id="chart-scroll">
      <div class="chart-scroll-inner" style="width: var(--chart-width); min-width: var(--chart-width);">
        <div class="date-header" id="date-header"></div>
        <div class="time-axis-wrap">
          <div class="time-axis" id="time-axis"></div>

          </div>

        <div class="chart-blocks-inner">
        <div class="chart-block">
          <div class="chart-label">Wind & Gusts</div>
          <div class="chart-legend-row">
            <span class="chart-swatch"><span class="chart-swatch-sq" style="background:var(--wind-strong)"></span>Summit</span>
            <span class="chart-swatch"><span class="chart-swatch-sq" style="background:var(--wind-moderate)"></span>Mid</span>

          <div class="chart-container">
            <canvas id="wind-chart" width="1100" height="180"></canvas>

        </div>
        <div class="chart-block">
          <div class="chart-label">Temperature & Freezing Level</div>
          <div class="chart-subtitle">All values in °C</div>
          <div class="chart-legend-row">
            <span class="chart-swatch" style="color:var(--color-accent)"><span class="chart-swatch-line solid"></span>Temp</span>
            <span class="chart-swatch" style="color:var(--color-text-secondary)"><span class="chart-swatch-line dashed"></span>Dew Point</span>
            <span class="chart-swatch" style="color:var(--color-text-muted)"><span class="chart-swatch-line dashed"></span>Freezing Level</span>

        <div class="chart-block">
          <div class="chart-label">Precipitation</div>

            <canvas id="precip-chart" width="1100" height="180"></canvas>

        </div>
      </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="forecast.html" class="nav-item active">
      <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" /></svg></span>
      Location
    </a>
    <a href="search.html" class="nav-item">
      <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg></span>
      Search

    <a href="saved.html" class="nav-item">
      <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z" /></svg></span>
      Saved

      <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg></span>

  </div><!-- .app-frame -->

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var lat = parseFloat(params.get('lat')) || 49.3756;
      var lng = parseFloat(params.get('lng')) || -123.0378;
      var elevationFromUrl = params.get('elevation');
      var elevation = elevationFromUrl !== null && elevationFromUrl !== '' ? parseInt(elevationFromUrl, 10) : null;
      var locationName = params.get('name') ? decodeURIComponent(params.get('name')) : 'Garibaldi Lake TH';
      var urlModel = params.get('model') || '';

      var MODELS = [
        { name: 'ECMWF', api: 'ecmwf_ifs025' },
        { name: 'GFS', api: 'gfs_seamless' },
        { name: 'GEM', api: 'gem_seamless' },
        { name: 'HRRR', api: 'ncep_hrrr_conus' }
      ];
      var modelIdx = 0;
      if (urlModel) {
        var mi = MODELS.findIndex(function(m) { return m.name === urlModel; });
        if (mi >= 0) modelIdx = mi;
      } else if (window.GustySettings) {
        var defaultModel = GustySettings.getDefaultModel();
        var dm = MODELS.findIndex(function(m) { return m.name === defaultModel; });
        if (dm >= 0) modelIdx = dm;
      }

      document.querySelector('.location-name').textContent = locationName;
      var backBtn = document.getElementById('back-btn');
      if (backBtn) {
        var p = new URLSearchParams({ lat: lat, lng: lng, name: locationName });
        if (elevation != null && !isNaN(elevation)) p.set('elevation', elevation);
        backBtn.href = 'forecast.html?' + p.toString();
      }

      var xAxisTicksEvery2 = {
        grid: { color: 'rgba(255,255,255,0.07)' },
        ticks: {
          color: '#4A5C72',
          font: { size: 10, family: "'DM Mono'" },
          maxRotation: 0,
          callback: function(val, index, ticks) {
            return index % 2 === 0 ? this.getLabelForValue(val) : '';
          }
        }
      };
      var CHART_OPTS = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: xAxisTicksEvery2,
          y: { grid: { color: 'rgba(255,255,255,0.07)' }, ticks: { color: '#4A5C72', font: { size: 10, family: "'DM Mono'" } } }
        }
      };

      var labels = [];
      for (var li = 0; li < 48; li++) labels.push('');

      var timeAxisEl = document.getElementById('time-axis');
      timeAxisEl.innerHTML = '';
      for (var si = 0; si < 48; si++) {
        var span = document.createElement('span');
        span.className = 'time-tick';
        span.textContent = '';
        timeAxisEl.appendChild(span);
      }

      var windData = { summit: [], mid: [], trailhead: [], gustsSummit: [], gustsMid: [], gustsTrailhead: [] };
      var tempData = { temp: [], dewPoint: [], freezing: [] };
      var precipData = { cloud: [], rain: [], snow: [] };

      var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var dayAbbrev = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      function formatDateHeader(d) {
        return dayNames[d.getDay()] + ' · ' + monthNames[d.getMonth()] + ' ' + d.getDate();
      }

      function formatLabel(iso) {
        var d = new Date(iso);
        var h = d.getHours();
        var today = new Date();
        if (d.getDate() !== today.getDate() || d.getMonth() !== today.getMonth() || d.getFullYear() !== today.getFullYear()) {
          if (h === 0) return dayAbbrev[d.getDay()] + ' ' + d.getDate();
          return dayAbbrev[d.getDay()] + ' ' + (h === 12 ? '12pm' : h < 12 ? h + 'am' : (h - 12) + 'pm');
        }
        return h === 0 ? '12am' : h === 12 ? '12pm' : h < 12 ? h + 'am' : (h - 12) + 'pm';
      }

      var dateHeaderEl = document.getElementById('date-header');
      if (dateHeaderEl) dateHeaderEl.textContent = formatDateHeader(new Date());

      function fetchForecast(modelApi, elev) {
        var p = new URLSearchParams({
          latitude: lat,
          longitude: lng,
          hourly: 'windspeed_10m,windgusts_10m,temperature_2m,dewpoint_2m,precipitation,cloudcover',
          wind_speed_unit: 'kmh',
          timezone: 'America/Vancouver',
          forecast_days: 2,
          models: modelApi
        });
        var elevVal = elev != null ? elev : (elevation != null && !isNaN(elevation) ? elevation : null);
        if (elevVal != null && !isNaN(elevVal)) p.set('elevation', elevVal);
        return fetch('https://api.open-meteo.com/v1/forecast?' + p).then(function(r) { return r.json(); });
      }

      function extractHourly(arr, len) {
        if (!arr) return [];
        return arr.slice(0, len).map(function(v) { return v != null ? v : 0; });
      }

      function loadModelData() {
        var model = MODELS[modelIdx];
        var selectEl = document.getElementById('model-select');
        if (!selectEl) return;
        selectEl.value = model.name;
        selectEl.disabled = true;

        fetchForecast(model.api, null).then(function(mainData) {
          if (mainData.error) {
            console.error('API error:', mainData.reason || mainData);
            return Promise.reject(new Error(mainData.reason || 'API error'));
          }
          var baseElev = mainData.elevation != null && !isNaN(mainData.elevation) ? mainData.elevation : (elevation || 0);
          var elevationChip = document.getElementById('elevation-chip');
          if (elevationChip && mainData.elevation != null && !isNaN(mainData.elevation)) {
            console.log(mainData.elevation);
            elevationChip.textContent = Math.round(mainData.elevation).toLocaleString() + ' m';
            if (backBtn) {
              var p = new URLSearchParams({ lat: lat, lng: lng, name: locationName });
              p.set('elevation', Math.round(mainData.elevation));
              backBtn.href = 'forecast.html?' + p.toString();
            }
          } else if (elevationChip) {
            elevationChip.textContent = '—';
          }
          var elevTrail = baseElev;
          var elevMid = baseElev + 500;
          var elevSummit = baseElev + 1000;

          return Promise.all([
            fetchForecast(model.api, elevTrail),
            fetchForecast(model.api, elevMid),
            fetchForecast(model.api, elevSummit)
          ]).then(function(windResults) {
            var windTrail = windResults[0].hourly;
            var windMid = windResults[1].hourly;
            var windSummit = windResults[2].hourly;
            var main = mainData.hourly;
            var len = Math.min(48, main.time.length);

            windData.trailhead = extractHourly(windTrail.windspeed_10m, len);
            windData.mid = extractHourly(windMid.windspeed_10m, len);
            windData.summit = extractHourly(windSummit.windspeed_10m, len);
            windData.gustsTrailhead = extractHourly(windTrail.windgusts_10m, len);
            windData.gustsMid = extractHourly(windMid.windgusts_10m, len);
            windData.gustsSummit = extractHourly(windSummit.windgusts_10m, len);

            tempData.temp = extractHourly(main.temperature_2m, len);
            tempData.dewPoint = extractHourly(main.dewpoint_2m, len);
            tempData.freezing = tempData.temp.map(function(t, i) {
              return baseElev + Math.max(0, -t * 120);
            });

            precipData.cloud = extractHourly(main.cloudcover, len);
            var precip = extractHourly(main.precipitation, len);
            precipData.rain = tempData.temp.map(function(t, i) { return t >= 0 ? (precip[i] || 0) : 0; });
            precipData.snow = tempData.temp.map(function(t, i) { return t < 0 ? (precip[i] || 0) / 10 : 0; });

            if (main.time && main.time.length >= len) {
              for (var i = 0; i < len; i++) labels[i] = formatLabel(main.time[i]);
              for (var j = 0; j < len && j < timeAxisEl.children.length; j++) {
                timeAxisEl.children[j].textContent = (j % 2 === 0) ? labels[j] : '';
              }
            }

            windChart.data.datasets[0].data = windData.summit;
            windChart.data.datasets[1].data = windData.mid;
            windChart.data.datasets[2].data = windData.trailhead;
            windChart.data.labels = labels;
            windChart.update('none');

            tempChart.data.datasets[0].data = tempData.temp;
            tempChart.data.datasets[1].data = tempData.dewPoint;
            tempChart.data.datasets[2].data = tempData.freezing;
            tempChart.data.labels = labels.slice(0, len);
            tempChart.update('none');

            precipChart.data.datasets[0].data = precipData.cloud;
            precipChart.data.datasets[1].data = precipData.rain;
            precipChart.data.datasets[2].data = precipData.snow;
            precipChart.data.labels = labels;
            precipChart.update('none');
          });
        }).catch(function(err) {
          console.error('Fetch error:', err);
        }).finally(function() {
          selectEl.disabled = false;
        });
      }

      var windChart = new Chart(document.getElementById('wind-chart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'Summit', data: windData.summit, borderColor: '#F97316', backgroundColor: 'transparent', borderWidth: 2, tension: 0.3, pointRadius: 0 },
            { label: 'Mid', data: windData.mid, borderColor: '#FBBF24', backgroundColor: 'transparent', borderWidth: 2, tension: 0.3, pointRadius: 0 },
            { label: 'Trailhead', data: windData.trailhead, borderColor: '#34D399', backgroundColor: 'transparent', borderWidth: 2, tension: 0.3, pointRadius: 0 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index' },
          hover: { mode: 'index' },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: function(items) { return items[0] && items[0].label ? items[0].label : ''; },
                label: function(ctx) {
                  var i = ctx.dataIndex;
                  var gust = ctx.datasetIndex === 0 ? windData.gustsSummit[i] : ctx.datasetIndex === 1 ? windData.gustsMid[i] : windData.gustsTrailhead[i];
                  var windUnit = window.GustySettings ? GustySettings.getWindUnit() : 'km/h';
                  var val = ctx.raw;
                  var gustVal = gust != null ? gust : null;
                  var valDisp = window.GustySettings ? GustySettings.convertWindForDisplay(val) : (val != null ? Math.round(val) : null);
                  var gustDisp = window.GustySettings ? GustySettings.convertWindForDisplay(gustVal) : (gustVal != null ? Math.round(gustVal) : null);
                  return ctx.dataset.label + ': ' + (valDisp != null ? valDisp : '—') + ' ' + windUnit + ' · Gusts ' + (gustDisp != null ? gustDisp : '—') + ' ' + windUnit;
                }
              },
              usePointStyle: true,
              boxPadding: 4
            }
          },
          scales: {
            x: xAxisTicksEvery2,
            y: { grid: { color: 'rgba(255,255,255,0.07)' }, ticks: { color: '#4A5C72', font: { size: 10, family: "'DM Mono'" } }, min: 0, max: 120 }
          }
        }
      });

      var tempChart = new Chart(document.getElementById('temp-chart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'Temp', data: tempData.temp, borderColor: '#38BDF8', backgroundColor: 'transparent', borderWidth: 2, tension: 0.3, pointRadius: 0 },
            { label: 'Dew Point', data: tempData.dewPoint, borderColor: '#8A9BB0', backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [4,4], tension: 0.3, pointRadius: 0 },
            { label: 'Freezing', data: tempData.freezing, borderColor: '#4A5C72', backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [4,4], tension: 0.3, pointRadius: 0, yAxisID: 'y1' }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: CHART_OPTS.scales.x,
            y: { ...CHART_OPTS.scales.y, position: 'left', min: -15, max: 10 },
            y1: { ...CHART_OPTS.scales.y, position: 'right', min: 1500, max: 2200, grid: { drawOnChartArea: false } }
          }
        }
      });

      var precipChart = new Chart(document.getElementById('precip-chart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Cloud', data: precipData.cloud, type: 'line', borderColor: 'rgba(255,255,255,0.08)', backgroundColor: 'rgba(255,255,255,0.04)', fill: true, tension: 0.3, pointRadius: 0, yAxisID: 'yCloud', order: 0 },
            { label: 'Rain', data: precipData.rain, backgroundColor: 'rgba(96, 165, 250, 0.85)', borderWidth: 0, stack: 'precip', order: 2 },
            { label: 'Snow', data: precipData.snow, backgroundColor: 'rgba(226, 232, 240, 0.70)', borderWidth: 0, stack: 'precip', order: 1 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: CHART_OPTS.scales.x,
            y: { ...CHART_OPTS.scales.y, position: 'left', stacked: true, min: 0, max: 2 },
            yCloud: { ...CHART_OPTS.scales.y, position: 'right', min: 0, max: 100, grid: { drawOnChartArea: false } }
          },
          datasets: { bar: { barPercentage: 0.8, categoryPercentage: 0.9 } }
        }
      });

      var modelSelect = document.getElementById('model-select');
      if (modelSelect) {
        modelSelect.selectedIndex = modelIdx;
        modelSelect.addEventListener('change', function() {
          modelIdx = modelSelect.selectedIndex;
          loadModelData();
        });
      }

      loadModelData();
    })();
  </script>
</body>
</html>
